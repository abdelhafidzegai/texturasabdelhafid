<html>
<head>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
  <a-scene>
    <a-assets>
      <img id="suelo" src="suelos.jpg">
      <img id="pared" src="paredes.jpg">
      <img id="vigas" src="vigas.jpg">
    </a-assets>
    <a-box position="0 0.1 0" depth="3" height="0.2" width="3" src="#suelo"></a-box>
    <a-box position="0 1.7 -1.4" rotation="90 90 90" depth="3" height="0.2" width="3" src="#pared"></a-box>
    <a-box position="1.4 1.7 0" rotation="90 0 90"  depth="3" height="0.2" width="3" src="#pared"></a-box>
    <a-box position="-1.4 1.7 0" rotation="90 0 90"depth="3" height="0.2" width="3" src="#pared"></a-box>
    <a-box position="0 3.2 0" depth="3" height="0.2" width="3" src="#vigas"></a-box>
    <a-light position="3 3 3" type="ambient"rotation="0 0 0" color="#FFF"></a-light>
    <a-camera id="camera"></a-camera>
    <a-sky color="#ECECEC"></a-sky>
    <a-entity id="ring" position="-3 1 3"></a-entity>
  </a-scene>
</body>
</html>
